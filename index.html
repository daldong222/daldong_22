<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>달동이 경제모니터링</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
<style>
  :root{
    --bg:#070a11; --card:#111725; --card-2:#0e1420;
    --border:rgba(255,255,255,.07); --border-soft:rgba(255,255,255,.045);
    --text:#e7eaf2; --dim:#8b93a7; --faint:#59616f;
    --green:#34d399; --amber:#fbbf24; --red:#f87171; --blue:#5b9bff;
    --grid:rgba(255,255,255,.055);
    --zone-strong:rgba(52,211,153,.055); --zone-watch:rgba(251,191,36,.05);
    --zone-corr:rgba(251,191,36,.09); --zone-bear:rgba(248,113,113,.10);
    --font:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",system-ui,sans-serif;
    --mono:ui-monospace,SFMono-Regular,Menlo,"Roboto Mono",monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:
      radial-gradient(1100px 520px at 12% -8%, #141d2e 0%, transparent 55%),
      radial-gradient(900px 480px at 100% 0%, #181320 0%, transparent 50%),
      var(--bg);
    color:var(--text); font-family:var(--font);
    font-feature-settings:"tnum" 1; -webkit-font-smoothing:antialiased;
    line-height:1.5; min-height:100vh;
  }
  .wrap{max-width:1180px;margin:0 auto;padding:26px 18px 72px}

  /* header */
  header.top{display:flex;flex-wrap:wrap;align-items:center;gap:14px 22px;padding-bottom:18px;margin-bottom:20px;border-bottom:1px solid var(--border-soft)}
  .brand{display:flex;align-items:center;gap:13px}
  .logo{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-weight:900;font-size:19px;
    background:linear-gradient(135deg,#1c2740,#0e1626);border:1px solid var(--border);color:#f2d27a;letter-spacing:-.03em}
  .brand h1{font-size:19px;font-weight:800;letter-spacing:-.02em;margin:0}
  .brand .sub{font-size:11px;color:var(--faint);letter-spacing:.14em;font-weight:600;margin-top:2px}
  .top-right{margin-left:auto;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .live-pill{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:700;color:var(--amber);
    background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.22);padding:5px 11px;border-radius:999px}
  .live-pill .dot{width:7px;height:7px;border-radius:50%;background:var(--amber);animation:pulse 1.8s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .socials{display:flex;gap:8px;flex-wrap:wrap}
  .socials a{font-size:11px;color:var(--dim);text-decoration:none;border:1px solid var(--border);
    padding:5px 9px;border-radius:8px;transition:.15s;display:inline-flex;align-items:center;gap:5px}
  .socials a svg{width:14px;height:14px;flex:0 0 auto}
  .socials a:hover{color:var(--text);border-color:rgba(255,255,255,.18)}

  /* summary hero strip */
  .hero{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:26px}
  .htile{background:linear-gradient(180deg,var(--card),var(--card-2));border:1px solid var(--border);border-radius:13px;padding:12px 13px;cursor:pointer;transition:border-color .15s,transform .1s}
  .htile:hover{border-color:rgba(255,255,255,.2);transform:translateY(-1px)}
  .htile:focus-visible{outline:2px solid var(--blue);outline-offset:2px}
  .card.flash{animation:cardflash 1.5s ease}
  @keyframes cardflash{0%,100%{box-shadow:none;border-color:var(--border)}25%{box-shadow:0 0 0 2px var(--blue);border-color:var(--blue)}}
  html{scroll-behavior:smooth}
  .htile .hk{font-size:11px;color:var(--dim);font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:6px}
  .htile .hk .sw{width:7px;height:7px;border-radius:2px}
  .htile .hv{font-size:18px;font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums;line-height:1.1}
  .htile .hc{font-size:11px;font-weight:600;margin-top:3px;font-variant-numeric:tabular-nums}
  .up{color:var(--green)} .down{color:var(--red)} .flat{color:var(--dim)}

  /* group */
  .group{margin-bottom:30px}
  .group-title{font-size:13px;font-weight:800;color:var(--dim);letter-spacing:.02em;margin:0 0 13px;
    display:flex;align-items:center;gap:8px}
  .group-title .em{font-size:15px}
  .group-title .rule{flex:1;height:1px;background:var(--border-soft)}

  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .grid.two{grid-template-columns:repeat(2,1fr)}

  .card{background:linear-gradient(180deg,var(--card),var(--card-2));border:1px solid var(--border);
    border-radius:15px;padding:16px 16px 14px;display:flex;flex-direction:column;
    opacity:0;transform:translateY(8px);animation:rise .45s cubic-bezier(.2,.7,.3,1) forwards}
  @keyframes rise{to{opacity:1;transform:none}}
  .card.span2{grid-column:span 2}
  .card.span3{grid-column:1/-1}

  .chead{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px}
  .cname{display:flex;align-items:center;gap:8px}
  .cname .sw{width:9px;height:9px;border-radius:3px;flex:0 0 auto}
  .cname .nm{font-size:14.5px;font-weight:700;letter-spacing:-.01em}
  .cname .tk{font-size:10.5px;color:var(--faint);font-weight:500;display:block;margin-top:1px}

  .range{display:inline-flex;background:var(--card-2);border:1px solid var(--border);border-radius:8px;padding:2px;gap:2px}
  .range button{font-family:inherit;font-size:10.5px;font-weight:700;color:var(--dim);background:transparent;
    border:0;border-radius:6px;padding:3px 7px;cursor:pointer;transition:.15s}
  .range button:hover{color:var(--text)}
  .range button[aria-pressed="true"]{background:rgba(255,255,255,.09);color:var(--text)}
  .range button:focus-visible{outline:2px solid var(--blue);outline-offset:1px}

  .chart{width:100%;margin:2px 0 10px}
  .chart svg{display:block;width:100%;height:auto}
  .axis-label{fill:var(--faint);font-size:9px;font-family:var(--font)}

  .stat{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;margin-top:auto}
  .big{display:flex;flex-direction:column}
  .big .l{font-size:10.5px;color:var(--faint);margin-bottom:2px}
  .big .v{font-size:26px;font-weight:800;letter-spacing:-.03em;line-height:1;font-variant-numeric:tabular-nums}
  .big .v.small{font-size:22px}
  .chg{font-size:12px;font-weight:700;font-variant-numeric:tabular-nums}
  .badge{align-self:flex-end;font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px;white-space:nowrap}

  .explain{margin-top:12px;padding-top:11px;border-top:1px solid var(--border-soft);font-size:11.5px;color:var(--dim);line-height:1.55}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .chip{font-size:10.5px;font-weight:600;padding:3px 8px;border-radius:7px;border:1px solid var(--border);color:var(--dim)}
  .chip b{color:var(--text)}

  /* drawdown explainer (shared) */
  .dd-explain{margin-top:14px;background:var(--card-2);border:1px solid var(--border);border-radius:15px;padding:18px 20px}
  .dd-explain h3{font-size:14px;font-weight:700;margin:0 0 6px;display:flex;align-items:center;gap:8px}
  .dd-explain>p{margin:0 0 14px;color:var(--dim);font-size:12.5px}
  .dd-explain>p b{color:var(--text)}
  .zones{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}
  .zone{border-radius:11px;padding:12px 14px;border:1px solid var(--border)}
  .zone.s{background:linear-gradient(180deg,rgba(52,211,153,.1),rgba(52,211,153,.02))}
  .zone.c{background:linear-gradient(180deg,rgba(251,191,36,.1),rgba(251,191,36,.02))}
  .zone.b{background:linear-gradient(180deg,rgba(248,113,113,.11),rgba(248,113,113,.02))}
  .zone .zh{font-weight:800;font-size:14px;margin-bottom:2px;display:flex;align-items:center;gap:7px}
  .zone .zd{font-size:11.5px;color:var(--dim)}
  .zone.s .zh{color:var(--green)} .zone.c .zh{color:var(--amber)} .zone.b .zh{color:var(--red)}

  /* gauge */
  .gauge-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;margin:6px 0 4px}
  .gauge-val{font-size:34px;font-weight:800;letter-spacing:-.03em;font-variant-numeric:tabular-nums}
  .gauge-lab{font-size:12px;font-weight:700}
  .fg-hist{display:flex;justify-content:space-between;gap:8px;margin-top:10px;padding-top:11px;border-top:1px solid var(--border-soft)}
  .fg-hist .c{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1}
  .fg-hist .c .t{font-size:10px;color:var(--faint)}
  .fg-hist .c .n{font-size:15px;font-weight:800;font-variant-numeric:tabular-nums}

  /* option tiles */
  .otiles{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .otile{background:var(--card-2);border:1px solid var(--border);border-radius:11px;padding:12px 13px;text-align:center}
  .otile .ok{font-size:11px;color:var(--dim);font-weight:700;margin-bottom:5px}
  .otile .ov{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums}
  .otile .od{font-size:10px;color:var(--faint);margin-top:3px}

  /* heatmap */
  .heat{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
  .hcell{border-radius:10px;padding:12px 8px;text-align:center;border:1px solid var(--border)}
  .hcell .hn{font-size:11px;font-weight:600;color:var(--text);opacity:.92}
  .hcell .hp{font-size:15px;font-weight:800;font-variant-numeric:tabular-nums;margin-top:3px}

  footer{margin-top:30px;color:var(--faint);font-size:12px;line-height:1.65}
  footer .note{background:var(--card-2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:12px;color:var(--dim)}
  footer .note b{color:var(--text)}
  footer code{background:rgba(255,255,255,.06);padding:1px 6px;border-radius:5px;font-family:var(--mono);font-size:11.5px;color:#cdd4e2}
  footer .sig{color:var(--text);font-weight:600}

  @media (max-width:960px){
    .hero{grid-template-columns:repeat(3,1fr)}
    .grid,.grid.two{grid-template-columns:1fr}
    .card.span2,.card.span3{grid-column:auto}
    .zones{grid-template-columns:1fr}
    .otiles{grid-template-columns:repeat(2,1fr)}
    .heat{grid-template-columns:repeat(3,1fr)}
  }
  @media (max-width:520px){ .hero{grid-template-columns:repeat(2,1fr)} }
  @media (prefers-reduced-motion:reduce){ .card{animation:none;opacity:1;transform:none} .live-pill .dot{animation:none} }
  /* recent posts feed */
  .group-title .handle{font-size:11px;color:var(--dim);text-decoration:none;border:1px solid var(--border);padding:4px 9px;border-radius:8px;font-weight:600}
  .group-title .handle:hover{color:var(--text)}
  .posts{background:linear-gradient(180deg,var(--card),var(--card-2));border:1px solid var(--border);border-radius:15px;padding:16px 18px}
  .posts-head{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .posts-head .pt{font-size:14px;font-weight:700}
  .pgo{font-size:11.5px;color:var(--blue);text-decoration:none;white-space:nowrap;font-weight:600}
  .pgo:hover{text-decoration:underline}
  .posts-sub{font-size:11.5px;color:var(--faint);margin-top:2px}
  .post{display:flex;align-items:flex-start;gap:11px;padding:13px 0;border-top:1px solid var(--border-soft);margin-top:10px}
  .post:first-of-type{margin-top:12px}
  .pdot{width:26px;height:26px;border-radius:8px;background:var(--card-2);border:1px solid var(--border);display:grid;place-items:center;font-size:12px;flex:0 0 auto}
  .pbody{flex:1;min-width:0}
  .prow{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .ptime{font-size:11.5px;color:var(--dim);font-variant-numeric:tabular-nums}
  .plink{display:block;margin-top:4px;font-size:13px;color:#a9c4ff;text-decoration:none;word-break:break-word}
  .plink:hover{text-decoration:underline}

  /* economic calendar */
  .econ{background:linear-gradient(180deg,var(--card),var(--card-2));border:1px solid var(--border);border-radius:15px;padding:4px 4px 6px}
  .econ-cap{font-size:11px;color:var(--faint);padding:11px 14px 7px}
  .econ-row{display:flex;align-items:center;gap:12px;padding:11px 14px;border-top:1px solid var(--border-soft)}
  .ec-date{width:52px;flex:0 0 auto;font-size:11px;color:var(--dim);font-variant-numeric:tabular-nums;line-height:1.25}
  .ec-date b{display:block;font-size:12.5px;color:var(--text);font-weight:700}
  .ec-main{flex:1;min-width:0}
  .ec-name{font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px}
  .ec-imp{width:7px;height:7px;border-radius:50%;flex:0 0 auto}
  .imp3{background:var(--red)} .imp2{background:var(--amber)} .imp1{background:var(--faint)}
  .ec-vals{font-size:11px;color:var(--faint);margin-top:2px;font-variant-numeric:tabular-nums}
  .ec-act{flex:0 0 auto;text-align:right;font-size:14px;font-weight:800;font-variant-numeric:tabular-nums;min-width:72px}
  .tone-good{color:var(--green)} .tone-bad{color:var(--red)} .tone-neutral{color:var(--text)}
  .ec-up{flex:0 0 auto;font-size:11px;font-weight:700;color:var(--dim);border:1px solid var(--border);padding:4px 9px;border-radius:999px;white-space:nowrap}

  /* clickable cards + detail modal */
  .clickable{cursor:pointer;transition:border-color .15s}
  .clickable:hover{border-color:rgba(255,255,255,.17)}
  .clickable:focus-visible{outline:2px solid var(--blue);outline-offset:2px}
  .why-btn{margin-top:12px;width:100%;display:flex;align-items:center;justify-content:center;gap:6px;
    font-family:inherit;font-size:12px;font-weight:700;color:#a9c4ff;
    background:rgba(91,155,255,.1);border:1px solid rgba(91,155,255,.28);border-radius:9px;
    padding:8px 10px;cursor:pointer;transition:.15s}
  .why-btn:hover{background:rgba(91,155,255,.18);border-color:rgba(91,155,255,.46);color:#c9dbff}
  .why-btn:focus-visible{outline:2px solid var(--blue);outline-offset:2px}

  .modal{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
  .modal.open{display:flex}
  .mbackdrop{position:absolute;inset:0;background:rgba(4,7,12,.72);backdrop-filter:blur(3px)}
  .mpanel{position:relative;max-width:540px;width:100%;max-height:86vh;overflow:auto;
    background:linear-gradient(180deg,#131a2a,#0e1420);border:1px solid var(--border);border-radius:18px;
    padding:22px 22px 20px;box-shadow:0 24px 60px rgba(0,0,0,.5);animation:pop .22s cubic-bezier(.2,.8,.3,1)}
  @keyframes pop{from{opacity:0;transform:translateY(12px) scale(.98)}to{opacity:1;transform:none}}
  .mclose{position:absolute;top:14px;right:14px;width:30px;height:30px;border-radius:9px;border:1px solid var(--border);
    background:var(--card-2);color:var(--dim);font-size:13px;cursor:pointer;line-height:1}
  .mclose:hover{color:var(--text)}
  .mhead{display:flex;align-items:center;gap:11px;margin-bottom:16px;padding-right:34px}
  .mhead .sw{width:11px;height:11px;border-radius:3px;flex:0 0 auto}
  .mname{font-size:18px;font-weight:800;letter-spacing:-.02em}
  .mtk{font-size:11px;color:var(--faint);margin-top:1px}
  .mnow{margin-left:auto;text-align:right;display:flex;flex-direction:column;gap:2px}
  .mnow-v{font-size:17px;font-weight:800;font-variant-numeric:tabular-nums}
  .mnow-t{font-size:11px;font-weight:700}
  .msec{margin-bottom:14px}
  .mlbl{font-size:11px;font-weight:800;letter-spacing:.05em;color:var(--blue);margin-bottom:5px}
  .msec p{margin:0;font-size:13.5px;color:var(--text);line-height:1.62;opacity:.92}
  .mpanel .chips{margin-top:4px}
</style>
</head>

<script>
"use strict";
/* ============================================================
   달동 마켓 대시보드 — config-driven
   실시간 연동: MODULES[].level / .ath / .day 값을 서버에서 받아 갱신 후 build()
   ============================================================ */

const N = 261, STEP = 7;                 // 주간 5년치
const NOW = new Date("2026-07-16T00:00:00");
const mAgoOf = i => ((N-1-i)*STEP)/30.44;

function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function fmt(n,d){return Number(n).toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d});}
function fmtDate(t){return `${String(t.getFullYear()).slice(2)}.${String(t.getMonth()+1).padStart(2,"0")}`;}
const dateOf = i => new Date(NOW.getTime()-(N-1-i)*STEP*864e5);

/* 가격형 시계열: 제어점 [mAgo,value] 사이 로그보간 + 노이즈 */
function genPrice(cfg){
  if(cfg._live&&cfg._live.length) return cfg._live;
  const rnd=mulberry32(cfg.seed), pts=[], cps=cfg.points.slice().sort((a,b)=>b[0]-a[0]); // 오래된→최근
  let n1=0;
  for(let i=0;i<N;i++){
    const m=mAgoOf(i);
    // 보간
    let v;
    if(m>=cps[0][0]) v=cps[0][1];
    else if(m<=cps[cps.length-1][0]) v=cps[cps.length-1][1];
    else{
      for(let k=0;k<cps.length-1;k++){
        if(m<=cps[k][0] && m>=cps[k+1][0]){
          const t=(cps[k][0]-m)/(cps[k][0]-cps[k+1][0]);
          v = cfg.linear ? cps[k][1]*(1-t)+cps[k+1][1]*t
                         : Math.exp(Math.log(cps[k][1])*(1-t)+Math.log(cps[k+1][1])*t);
          break;
        }
      }
    }
    n1=n1*0.8+(rnd()-0.5);
    if(cfg.linear) v += n1*(cfg.noiseAbs||0.1);
    else v*= (1 + n1*(cfg.vol||0.012));
    pts.push({t:dateOf(i), v});
  }
  pts[N-1].v=cfg.level;                    // 끝값 고정
  return pts;
}

/* 낙폭형 시계열: 하향 가우시안 이벤트 합, 값 ≤ 0, 끝값 = 목표낙폭 */
function genDrawdown(cfg){
  if(cfg._liveClose&&cfg._liveClose.length){ let mx=-Infinity; return cfg._liveClose.map(p=>{ mx=Math.max(mx,p.v); return {t:p.t,v:(p.v/mx-1)*100}; }); }
  const rnd=mulberry32(cfg.seed), pts=[]; let n1=0;
  const target=(cfg.level/cfg.ath-1)*100;
  for(let i=0;i<N;i++){
    const m=mAgoOf(i); let dd=0;
    for(const [c,dep,w] of cfg.dips) dd+=dep*Math.exp(-((m-c)*(m-c))/(2*w*w));
    n1=n1*0.82+(rnd()-0.5)*0.9; dd+=n1*0.7; dd=Math.min(0,dd);
    pts.push({t:dateOf(i), v:dd});
  }
  const bl=10; for(let k=0;k<bl;k++){const i=N-1-k,w=1-k/bl; pts[i].v=pts[i].v*(1-w)+target*w;}
  pts[N-1].v=target;
  return pts;
}

/* 통합 라인 차트 */
function chartSVG(slice, opts){
  const W=600,H=240,padT=30,padB=34,padL=opts.padL||(opts.drawdown?40:58),padR=12;
  const pW=W-padL-padR,pH=H-padT-padB,n=slice.length;
  let mn=Infinity,mx=-Infinity; for(const p of slice){if(p.v<mn)mn=p.v; if(p.v>mx)mx=p.v;}
  let yBot,yTop;
  if(opts.drawdown){ yBot=Math.min(-5,Math.floor((mn-1.2)/5)*5); yTop=Math.max(4,(0-yBot)*0.30); }
  else{
    const pad=(mx-mn)*0.22||Math.abs(mx)*0.08||1;
    yTop=mx+pad; yBot=mn-pad;
    if(opts.zeroline && yBot>0) yBot=Math.min(0,yBot);
    if(opts.zeroline && yBot>-0.05 && mn>=0) yBot=0;
  }
  const X=i=>padL+(i/(n-1))*pW, Y=v=>padT+((yTop-v)/(yTop-yBot))*pH;

  let bands="";
  if(opts.drawdown){
    for(const [hi,lo,f] of [[0,-5,"var(--zone-strong)"],[-5,-10,"var(--zone-watch)"],[-10,-20,"var(--zone-corr)"],[-20,-100,"var(--zone-bear)"]]){
      const y1=Y(Math.min(hi,yTop)),y2=Y(Math.max(lo,yBot)); if(y2<=y1)continue;
      bands+=`<rect x="${padL}" y="${y1.toFixed(1)}" width="${pW}" height="${(y2-y1).toFixed(1)}" fill="${f}"/>`;
    }
  }
  let grid="";
  const gl = opts.drawdown ? [0,-5,-10,-20,-30,-40,-50] : opts.gridvals || [];
  for(const lv of gl){ if(lv>yTop||lv<yBot)continue; const y=Y(lv);
    grid+=`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="var(--grid)" stroke-width="1" ${lv===0?'':'stroke-dasharray="3 4"'}/>`;
    grid+=`<text class="axis-label" x="${padL-6}" y="${(y+3).toFixed(1)}" text-anchor="end">${opts.fmtY?opts.fmtY(lv):lv+"%"}</text>`;
  }
  // 임계선
  if(opts.thresholds) for(const th of opts.thresholds){ if(th.y>yTop||th.y<yBot)continue; const y=Y(th.y);
    grid+=`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="${th.c}" stroke-width="1" stroke-dasharray="4 4" opacity=".55"/>`;
    if(th.label) grid+=`<text class="axis-label" x="${W-padR}" y="${(y-3).toFixed(1)}" text-anchor="end" fill="${th.c}">${th.label}</text>`;
  }
  // 자동 y라벨(비낙폭)
  if(!opts.drawdown && !gl.length){
    for(const lv of [yTop, (yTop+yBot)/2, yBot]){ const y=Y(lv);
      grid+=`<text class="axis-label" x="${padL-6}" y="${(y+3).toFixed(1)}" text-anchor="end">${opts.fmtY?opts.fmtY(lv):fmt(lv,opts.yd??0)}</text>`;
    }
  }
  let line=""; for(let i=0;i<n;i++) line+=(i?"L":"M")+X(i).toFixed(1)+" "+Y(slice[i].v).toFixed(1)+" ";
  const area=line+`L${X(n-1).toFixed(1)} ${Y(yBot).toFixed(1)} L${X(0).toFixed(1)} ${Y(yBot).toFixed(1)} Z`;
  const idxs=[0,Math.floor(n/2),n-1]; let xs="";
  for(const i of idxs){const a=i===0?"start":(i===n-1?"end":"middle");
    xs+=`<text class="axis-label" x="${X(i).toFixed(1)}" y="${H-6}" text-anchor="${a}">${fmtDate(slice[i].t)}</text>`;}
  const gid="g"+Math.random().toString(36).slice(2,7), ex=X(n-1),ey=Y(slice[n-1].v),c=opts.color;
  return `<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="${opts.aria||''}">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${c}" stop-opacity=".26"/><stop offset="100%" stop-color="${c}" stop-opacity="0"/>
    </linearGradient></defs>
    ${bands}${grid}
    <path d="${area}" fill="url(#${gid})"/>
    <path d="${line}" fill="none" stroke="${c}" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${ex.toFixed(1)}" cy="${ey.toFixed(1)}" r="3.2" fill="${c}"/>
    <circle cx="${ex.toFixed(1)}" cy="${ey.toFixed(1)}" r="6.2" fill="${c}" opacity=".18"/>
    ${xs}</svg>`;
}

  if(dd>=-5)  return {tag:"강세장",   c:"var(--green)", bg:"rgba(52,211,153,.14)"};
  if(dd>=-10) return {tag:"강세·주의", c:"var(--amber)", bg:"rgba(251,191,36,.13)"};
  if(dd>=-20) return {tag:"조정 구간", c:"var(--amber)", bg:"rgba(251,191,36,.13)"};
  return {tag:"약세장", c:"var(--red)", bg:"rgba(248,113,113,.14)"};
}

function currentReadout(m){
  if(m.kind==="dd"){const dd=(m.level/m.ath-1)*100,v=verdict(dd);return {val:dd.toFixed(1)+"% · "+unitStr(m.level,m),tag:v.tag,c:v.c};}
  if(m.kind==="gauge"){const val=m.level,lab=val<25?"극단적 공포":val<45?"공포":val<55?"중립":val<75?"탐욕":"극단적 탐욕",c=val<45?"var(--amber)":val<55?"var(--dim)":"var(--green)";return {val:String(val),tag:lab,c};}
  if(m.kind==="px"){const d=m.day||0;return {val:unitStr(m.level,m),tag:(d>0?"▲ ":d<0?"▼ ":"")+Math.abs(d).toFixed(2)+"%",c:d>0?"var(--green)":d<0?"var(--red)":"var(--dim)"};}
  return {val:"",tag:"",c:"var(--dim)"};
}

function fmtYFactory(m){
  return v=>{
    const pre=m.pre||"", suf=m.suf||"", a=Math.abs(v), d=m.decimals??0;
    if(suf==="원"){
      if(a>=1e8) return (v/1e8).toFixed(1)+"억";
      if(a>=1e4) return (v/1e4).toFixed(a>=1e6?0:1)+"만";
      return fmt(v,d)+"원";
    }
    if(suf==="B") return pre+(v/1000).toFixed(1)+"T";      // 십억달러 → 조달러
    if(a>=1e6) return pre+(v/1e6).toFixed(1)+"M"+suf;
    if(a>=1e4) return pre+Math.round(v/1e3)+"K"+suf;
    return pre+fmt(v,d)+suf;
  };
}

function priceCard(m){
  const series=genPrice(m);
  const el=document.createElement("article"); el.className="card";
  const chg=m.day||0, cc=chg>0?"up":(chg<0?"down":"flat"), arrow=chg>0?"▲":(chg<0?"▼":"·");
  const _fred=FRED_IDS.has(m.id); const ranges=_fred?RANGE_MAC:RANGE_MKT; const _def=_fred?DEF_MAC:DEF_MKT;
  const opts={color:m.color, zeroline:m.zeroline, thresholds:m.thresholds, gridvals:m.gridvals,
    fmtY:m.fmtY||(m.suf==="%"?(v=>v.toFixed(m.decimals)+"%"):fmtYFactory(m)), yd:m.decimals, aria:m.name+" 추이"};
  el.innerHTML=`
    <div class="chead">
      <div class="cname"><span class="sw" style="background:${m.color}"></span>
        <span><span class="nm">${m.name}</span><span class="tk">${m.tk}</span></span></div>
      <div class="range" role="group" aria-label="${m.name} 기간">${ranges.map((r,i)=>`<button data-y="${r[1]}" aria-pressed="${i===_def}">${r[0]}</button>`).join("")}</div>
    </div>

    <div class="stat">
      <div class="big"><span class="l">현재</span><span class="v small">${unitStr(m.level,m)}</span></div>
      ${m.day!==undefined?`<span class="chg ${cc}">${arrow} ${Math.abs(chg).toFixed(2)}%</span>`:""}
    </div>
    ${m.ex?`<div class="explain">${m.ex}${m.chips?`<div class="chips">${m.chips.map(c=>`<span class="chip"><b>${c[0]}</b> ${c[1]}</span>`).join("")}</div>`:""}</div>`:""}`;
  const box=el.querySelector("[data-chart]");
  const draw=(days)=>{ let src=series; if(days<=7){ const iv=(m.kind==="dd")?m._intraDD:m._intra; if(iv&&iv.length) src=iv; } const cut=Date.now()-days*864e5; let sl=src.filter(p=>p.t.getTime()>=cut); if(sl.length<2) sl=src.slice(-8); box.innerHTML=chartSVG(sl,opts); };
  el.querySelectorAll(".range button").forEach(b=>b.addEventListener("click",()=>{
    el.querySelectorAll(".range button").forEach(x=>x.setAttribute("aria-pressed", x===b?"true":"false"));
    draw(+b.dataset.y);
  }));
  draw(ranges[_def][1]);
  return el;
}

  const el=document.createElement("article"); el.className="card";
  const _fred=FRED_IDS.has(m.id); const ranges=_fred?RANGE_MAC:RANGE_MKT; const _def=_fred?DEF_MAC:DEF_MKT;
  const opts={color:m.color, drawdown:true, aria:m.name+" 낙폭"};
  el.innerHTML=`
    <div class="chead">
      <div class="cname"><span class="sw" style="background:${m.color}"></span>
        <span><span class="nm">${m.name}</span><span class="tk">${m.tk}</span></span></div>
      <div class="range" role="group" aria-label="${m.name} 기간">${ranges.map((r,i)=>`<button data-y="${r[1]}" aria-pressed="${i===_def}">${r[0]}</button>`).join("")}</div>
    </div>
    <div class="chart" data-chart></div>
    <div class="stat">
      <div class="big"><span class="l">전고점 대비 · 현재 ${unitStr(m.level,m)}</span><span class="v" style="color:${v.c}">${dd.toFixed(1)}%</span></div>
      <span class="badge" style="color:${v.c};background:${v.bg}">${v.tag}</span>
    </div>
    ${m.ex?`<div class="explain">${m.ex}</div>`:""}`;
  const box=el.querySelector("[data-chart]");
  const draw=(days)=>{ let src=series; if(days<=7){ const iv=(m.kind==="dd")?m._intraDD:m._intra; if(iv&&iv.length) src=iv; } const cut=Date.now()-days*864e5; let sl=src.filter(p=>p.t.getTime()>=cut); if(sl.length<2) sl=src.slice(-8); box.innerHTML=chartSVG(sl,opts); };
  el.querySelectorAll(".range button").forEach(b=>b.addEventListener("click",()=>{
    el.querySelectorAll(".range button").forEach(x=>x.setAttribute("aria-pressed", x===b?"true":"false"));
    draw(+b.dataset.y);
  }));
  draw(ranges[_def][1]);
  return el;
}

function gaugeCard(m){
  const el=document.createElement("article"); el.className="card";
  const val=m.level;
  const lab = val<25?"극단적 공포":val<45?"공포":val<55?"중립":val<75?"탐욕":"극단적 탐욕";
  const col = val<25?"var(--red)":val<45?"var(--amber)":val<55?"var(--dim)":val<75?"var(--green)":"#22c55e";
  // 반원 게이지
  const R=78,cx=100,cy=92,ang=Math.PI*(1-val/100);
  const px=cx+R*Math.cos(ang), py=cy-R*Math.sin(ang);
  const seg=(f,t,c)=>{const a0=Math.PI*(1-f/100),a1=Math.PI*(1-t/100);
    return `<path d="M ${cx+R*Math.cos(a0)} ${cy-R*Math.sin(a0)} A ${R} ${R} 0 0 1 ${cx+R*Math.cos(a1)} ${cy-R*Math.sin(a1)}" fill="none" stroke="${c}" stroke-width="12" stroke-linecap="round"/>`;};
  el.innerHTML=`
    <div class="chead"><div class="cname"><span class="sw" style="background:${m.color}"></span>
      <span><span class="nm">${m.name}</span><span class="tk">${m.tk}</span></span></div></div>
    <div class="gauge-wrap">
      <svg viewBox="0 0 200 108" width="100%" style="max-width:230px">
        ${seg(0,25,"rgba(248,113,113,.35)")}${seg(25,45,"rgba(251,191,36,.35)")}${seg(45,55,"rgba(139,147,167,.35)")}${seg(55,75,"rgba(52,211,153,.35)")}${seg(75,100,"rgba(34,197,94,.4)")}
        <line x1="${cx}" y1="${cy}" x2="${px.toFixed(1)}" y2="${py.toFixed(1)}" stroke="${col}" stroke-width="3"/>
        <circle cx="${cx}" cy="${cy}" r="4" fill="${col}"/>
      </svg>
      <div class="gauge-val" style="color:${col}">${val}</div>
      <div class="gauge-lab" style="color:${col}">${lab}</div>
    </div>
    <div class="fg-hist">${m.hist.map(h=>`<div class="c"><span class="t">${h[0]}</span><span class="n">${h[1]}</span></div>`).join("")}</div>
    ${m.ex?`<div class="explain">${m.ex}</div>`:""}`;
  return el;
}

function optionsCard(m){
  const el=document.createElement("article"); el.className="card span3";
  el.innerHTML=`
    <div class="chead"><div class="cname"><span class="sw" style="background:${m.color}"></span>
      <span><span class="nm">${m.name}</span><span class="tk">${m.tk}</span></span></div></div>
    <div class="otiles">${m.tiles.map(t=>`<div class="otile"><div class="ok">${t[0]}</div><div class="ov">${t[1]}</div><div class="od">${t[2]}</div></div>`).join("")}</div>
    ${m.ex?`<div class="explain">${m.ex}</div>`:""}`;

function heatCard(m){
  const el=document.createElement("article"); el.className="card span3";
  const cell=(nm,p)=>{
    const a=Math.min(1,Math.abs(p)/2.5);
    const bg=p>=0?`rgba(52,211,153,${0.1+a*0.32})`:`rgba(248,113,113,${0.1+a*0.32})`;
    const cc=p>=0?"var(--green)":"var(--red)";
    return `<div class="hcell" style="background:${bg}"><div class="hn">${nm}</div><div class="hp" style="color:${cc}">${p>0?"+":""}${p.toFixed(1)}%</div></div>`;
  };
  el.innerHTML=`
    <div class="chead"><div class="cname"><span class="sw" style="background:${m.color}"></span>
      <span><span class="nm">${m.name}</span><span class="tk">${m.tk}</span></span></div></div>
    <div class="heat">${m.data.map(d=>cell(d[0],d[1])).join("")}</div>
    ${m.ex?`<div class="explain">${m.ex}</div>`:""}`;
  return el;
}

function renderModule(m){
  if(m.kind==="dd") return ddCard(m);
  if(m.kind==="gauge") return gaugeCard(m);
  if(m.kind==="options") return optionsCard(m);
  if(m.kind==="heat") return heatCard(m);
  return priceCard(m);
}

/* 요약 스트립 */
function buildHero(){
  const hero=document.getElementById("hero");
  const find=id=>{for(const g of GROUPS)for(const m of g.mods)if(m.id===id)return m;};
  const ids=[];
  for(const g of GROUPS) for(const m of g.mods) if(m.kind==="dd"||m.kind==="px"||m.kind==="gauge") ids.push(m.id);
  hero.innerHTML=ids.map(id=>{
    const m=find(id);
    let head, cc, sub;
    if(m.kind==="dd"){ const dd=(m.level/m.ath-1)*100; head=dd.toFixed(1)+"%"; cc=verdict(dd).c; sub=`현재 ${unitStr(m.level,m)}`; }
    else if(m.kind==="gauge"){ const v=m.level; head=String(v); cc=v<45?"var(--amber)":v<55?"var(--dim)":"var(--green)"; sub="공포탐욕"; }
    else{ const d=m.day||0; head=(d>0?"▲ ":d<0?"▼ ":"")+Math.abs(d).toFixed(2)+"%"; cc=d>0?"var(--green)":d<0?"var(--red)":"var(--dim)"; sub=`현재 ${unitStr(m.level,m)}`; }
    return `<div class="htile" data-target="${m.id}" role="button" tabindex="0" aria-label="${m.name} 차트로 이동">
      <div class="hk"><span class="sw" style="background:${m.color}"></span>${m.name}</div>
      <div class="hv" style="color:${cc}">${head}</div><div class="hc">${sub}</div></div>`;
  }).join("");
  hero.querySelectorAll("[data-target]").forEach(t=>{
    const go=()=>{ const el=document.getElementById("card-"+t.dataset.target);
      if(el){ el.scrollIntoView({behavior:"smooth",block:"center"}); el.classList.add("flash"); setTimeout(()=>el.classList.remove("flash"),1500); } };
    t.addEventListener("click",go);
    t.addEventListener("keydown",e=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(); } });
  });
}

let IS_LIVE=false;
/* ============================================================
   실시간 데이터 로딩: /api/* 에서 받아 모듈에 주입. 실패하면 샘플로 폴백.
   ============================================================ */
async function hydrate(){
  const find=id=>{for(const g of GROUPS)for(const m of g.mods)if(m.id===id)return m;};
  const ymap={spx:"^GSPC",ndx:"^IXIC",gold:"GC=F",btc:"BTC-USD",kospi:"^KS11",kosdaq:"^KQ11",sec:"005930.KS",krw:"KRW=X",vix:"^VIX",dxy:"DX-Y.NYB",jpy:"JPY=X",wti:"CL=F",copper:"HG=F"};
  const sectorMap={"반도체":"SOXX","기술":"XLK","임의소비재":"XLY","통신":"XLC","금융":"XLF","산업재":"XLI","소재":"XLB","헬스케어":"XLV","필수소비재":"XLP","유틸리티":"XLU","부동산":"XLRE","에너지":"XLE"};
  const optMap={"SKEW":"^SKEW","VVIX":"^VVIX","OVX":"^OVX"};
  const fmap={us10y:"DGS10",curve:"T10Y2Y",m2:"M2SL",unrate:"UNRATE",claims:"ICSA",walcl:"WALCL",reserves:"WRESBAL"};
  const ySyms=[...new Set([...Object.values(ymap),...Object.values(sectorMap),...Object.values(optMap)])];
  try{
    const data=await fetch(`/api/quotes?symbols=${encodeURIComponent(ySyms.join(","))}`).then(r=>r.json());
    for(const [mid,sym] of Object.entries(ymap)){
      const d=data[sym]; if(!d||d.error||!d.closes||!d.closes.length) continue;
      const m=find(mid); if(!m) continue;
      const closes=d.closes.map(c=>({t:new Date(c.t),v:c.v}));
      if(m.kind==="dd"){ m._liveClose=closes; m.level=d.price; m.ath=Math.max.apply(null,closes.map(c=>c.v));
        if(d.intra&&d.intra.length){ const _a=m.ath; m._intraDD=d.intra.map(c=>({t:new Date(c.t),v:(c.v/_a-1)*100})); } }
      else { m._live=closes; m.level=d.price; if(typeof d.changePct==="number") m.day=+d.changePct.toFixed(2);
        if(d.intra&&d.intra.length) m._intra=d.intra.map(c=>({t:new Date(c.t),v:c.v})); }
      IS_LIVE=true;
    }
    const sm=find("sectors");
    if(sm) sm.data=sm.data.map(([name,val])=>{ const s=sectorMap[name],d=s&&data[s]; return [name, d&&!d.error&&typeof d.changePct==="number"? +d.changePct.toFixed(1):val]; });
    const om=find("opts");
    if(om) om.tiles=om.tiles.map(t=>{ const s=optMap[t[0]],d=s&&data[s]; return [t[0], d&&!d.error&&d.price!=null? +d.price.toFixed(0):t[1], t[2]]; });
  }catch(e){}
  try{
    const data=await fetch(`/api/fred?series=${Object.values(fmap).join(",")}`).then(r=>r.json());
    for(const [mid,id] of Object.entries(fmap)){
      const d=data[id]; if(!d||d.error||!d.closes||!d.closes.length) continue;
      const m=find(mid); if(!m) continue;
      m._live=d.closes.map(c=>({t:new Date(c.t),v:c.v})); m.level=d.price; IS_LIVE=true;
    }
  }catch(e){}
  try{
    const fg=await fetch(`/api/feargreed`).then(r=>r.json());
    const m=find("fg"); if(m&&fg&&typeof fg.score==="number"){ m.level=Math.round(fg.score); if(Array.isArray(fg.hist)&&fg.hist.length) m.hist=fg.hist; }
  }catch(e){}
  try{
    const posts=await fetch(`/api/telegram?ch=daldong_22`).then(r=>r.json());
    if(Array.isArray(posts)&&posts.length) POSTS.items=posts;
  }catch(e){}
}
